<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Məhsul Detalları - TechAvokado</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Product Detail Page Styles */
        .product-detail {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 15px;
            margin-bottom: 30px;
            transition: color 0.3s;
        }
        
        .back-btn:hover {
            color: var(--primary);
        }
        
        .detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }
        
        .detail-image {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
        }
        
        .detail-image img {
            width: 100%;
            height: 400px;
            object-fit: contain;
        }
        
        .detail-info {
            padding: 20px 0;
        }
        
        .detail-category {
            display: inline-block;
            background: linear-gradient(135deg, #064e3b, #065f46);
            color: #6ee7b7;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: capitalize;
            margin-bottom: 16px;
        }
        
        .detail-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 20px;
            line-height: 1.3;
        }
        
        .detail-description {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 30px;
        }
        
        .detail-price {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary-glow);
            margin-bottom: 30px;
        }
        
        .detail-actions {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .btn-add-cart {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 18px 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
        }
        
        .btn-add-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.4);
        }
        
        .btn-add-cart.added {
            background: linear-gradient(135deg, #64748b, #475569);
        }
        
        .btn-favorite {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-favorite:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }
        
        .btn-favorite.liked {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
        }
        
        .detail-specs {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--border);
        }
        
        .detail-specs h3 {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .spec-item:last-child {
            border-bottom: none;
        }
        
        .spec-label {
            color: var(--text-muted);
        }
        
        .spec-value {
            color: var(--text);
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .detail-container {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .detail-title {
                font-size: 28px;
            }
            
            .detail-price {
                font-size: 32px;
            }
            
            .detail-image img {
                height: 280px;
            }
            
            .detail-actions {
                flex-direction: column;
            }
            
            .btn-add-cart {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <a href="index.htm" class="logo"> Tech<span>Avokado</span></a>
        <div class="header-search">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="navbar-search" placeholder="Məhsul axtar...">
        </div>
        <nav>
            <a href="index.htm">Ana Səhifə</a>
            <a href="index.htm#products">Məhsullar</a>
            <a href="#" id="nav-cart">Səbət <span class="badge" id="cart-count">0</span></a>
            <a href="#" id="nav-favorites">Sevimlilər <span class="badge" id="fav-count">0</span></a>
            <a href="index.htm#contact">Əlaqə</a>
        </nav>
        <div class="mobile-menu-btn" id="mobile-menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <!-- Product Detail -->
    <section class="product-detail">
        <a href="index.htm" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Geri qayıt
        </a>
        
        <div class="detail-container">
            <div class="detail-image">
                <img id="detail-img" src="" alt="">
            </div>
            <div class="detail-info">
                <span class="detail-category" id="detail-category"></span>
                <h1 class="detail-title" id="detail-title"></h1>
                <p class="detail-description" id="detail-description"></p>
                <div class="detail-price" id="detail-price"></div>
                
                <div class="detail-actions">
                    <button class="btn-add-cart" id="btn-add-cart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
                        </svg>
                        <span>Səbətə Əlavə Et</span>
                    </button>
                    <button class="btn-favorite" id="btn-favorite">🤍</button>
                </div>
                
                <div class="detail-specs">
                    <h3>Məhsul Haqqında</h3>
                    <div class="spec-item">
                        <span class="spec-label">Kateqoriya</span>
                        <span class="spec-value" id="spec-category"></span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Qiymət</span>
                        <span class="spec-value" id="spec-price"></span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Status</span>
                        <span class="spec-value" style="color: var(--primary);">Stokda var</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Cart Modal -->
    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛒 Alış-veriş Səbəti</h2>
                <span class="close" id="close-cart">&times;</span>
            </div>
            <div class="modal-body" id="cart-items">
                <p class="empty-message">Səbətiniz boşdur!</p>
            </div>
            <div class="modal-footer">
                <div class="cart-total">
                    <span>Cəmi:</span>
                    <span id="cart-total-price">0 AZN</span>
                </div>
                <button class="checkout-btn" id="checkout-btn">Sifarişi Tamamla</button>
            </div>
        </div>
    </div>

    <!-- Favorites Modal -->
    <div class="modal" id="favorites-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>❤️ Sevimlilər</h2>
                <span class="close" id="close-favorites">&times;</span>
            </div>
            <div class="modal-body" id="favorites-items">
                <p class="empty-message">Hələ sevimli məhsul yoxdur!</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // PRODUCT DATA (same as main site)
        // ============================================
        const products = [
            { id: 1, name: "Asus Vivobook S-14", description: "Asus Vivobook S-14, Ultra 5 225-H, 32GB RAM, 512GB SSD. Peşəkarlar üçün mükəmməl seçim.", price: "1550", priceNum: 1550, category: "laptop", image: "AVOKADO/Asus-VivoBook-s14-S3407CA.png" },
            { id: 2, name: "Asus Tuf F-16", description: "Asus Tuf F-16, Intel Core i5-13450HX, 16GB RAM, 512GB SSD, RTX 5060 8GB qrafik kart.", price: "2050", priceNum: 2050, category: "laptop", image: "AVOKADO/asus-tuf-F16-FX608JM-RV002.png" },
            { id: 3, name: "Ajazz 139 V2", description: "2.4GHz simsiz siçan, RGB işıqlandırma, uzun batareya ömrü.", price: "60", priceNum: 60, category: "mouse", image: "AVOKADO/ajazz-139-v2.png" },
            { id: 4, name: "Fantech WG11 Cruiser", description: "Oyun siçanı, optik düymələr, yüngül çəki.", price: "25", priceNum: 25, category: "mouse", image: "AVOKADO/fantech-wg11-cruiser.png" },
            { id: 6, name: "Skylion K-68", description: "Mexaniki klaviatura, RGB işıqlandırma, Compact dizayn.", price: "50", priceNum: 50, category: "keyboard", image: "AVOKADO/skylion-k68.png" },
            { id: 7, name: "Atom HE-68 Pro", description: "Mechanical keyboard, 68 keys, RGB lighting, retro design.", price: "119", priceNum: 119, category: "keyboard", image: "AVOKADO/atom-he68-pro-mk922-retro-beige.png" },
            { id: 8, name: "Atom 63 MK874 V2", description: "Oyun mexaniki klaviatura, Anti-Ghosting, RGB işıqlandırma.", price: "65", priceNum: 65, category: "keyboard", image: "AVOKADO/atom63-mk874-v2-mori.png" },
            { id: 9, name: "Msi Mag 255-F", description: "24,5 inch oyun monitoru, 200Hz, 0.5ms, IPS panel, HDR.", price: "320", priceNum: 320, category: "monitor", image: "AVOKADO/msi-mag-255f-e20.png" },
            { id: 12, name: "Baseus Bass 35-Max", description: "Simsiz səs kəsən qulaqlıq, uzun batareya ömrü, premium səs.", price: "70", priceNum: 70, category: "headset", image: "AVOKADO/baseus-bass-35-max.png" },
            { id: 13, name: "Baseus Bowie D05", description: "Simsiz qulaqlıq, uzun batareya ömrü, premium səs.", price: "90", priceNum: 90, category: "headset", image: "AVOKADO/baseus-bowie-d05.png" }
        ];

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        let cart = JSON.parse(localStorage.getItem('techavokado_cart')) || [];
        let favorites = JSON.parse(localStorage.getItem('techavokado_favorites')) || [];
        let likedProducts = new Set(JSON.parse(localStorage.getItem('techavokado_liked')) || []);

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        const product = products.find(p => p.id === productId);

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const cartCount = document.getElementById('cart-count');
        const favCount = document.getElementById('fav-count');
        const cartModal = document.getElementById('cart-modal');
        const favoritesModal = document.getElementById('favorites-modal');
        const cartItems = document.getElementById('cart-items');
        const favoritesItems = document.getElementById('favorites-items');
        const cartTotalPrice = document.getElementById('cart-total-price');

        // ============================================
        // INITIALIZE PRODUCT DETAIL
        // ============================================
        function initProductDetail() {
            if (!product) {
                document.querySelector('.product-detail').innerHTML = `
                    <div style="text-align: center; padding: 100px 20px;">
                        <h2 style="color: var(--text); margin-bottom: 20px;">Məhsul tapılmadı</h2>
                        <a href="index.htm" class="btn-primary" style="display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border-radius: 12px; text-decoration: none;">
                            Ana Səhifəyə Qayıt
                        </a>
                    </div>
                `;
                return;
            }

            // Fill product details
            document.getElementById('detail-img').src = product.image;
            document.getElementById('detail-img').alt = product.name;
            document.getElementById('detail-category').textContent = product.category;
            document.getElementById('detail-title').textContent = product.name;
            document.getElementById('detail-description').textContent = product.description;
            document.getElementById('detail-price').textContent = product.price + ' AZN';
            document.getElementById('spec-category').textContent = getCategoryName(product.category);
            document.getElementById('spec-price').textContent = product.price + ' AZN';

            // Update button states
            updateButtonStates();
        }

        function getCategoryName(category) {
            const names = {
                laptop: 'Noutbuklar',
                mouse: 'Siçanlar',
                keyboard: 'Klaviaturalar',
                monitor: 'Monitorlar',
                headset: 'Qulaqlıqlar',
                accessory: 'Aksessuarlar'
            };
            return names[category] || category;
        }

        function updateButtonStates() {
            const cartBtn = document.getElementById('btn-add-cart');
            const favBtn = document.getElementById('btn-favorite');
            
            const isInCart = cart.some(item => item.id === product.id);
            const isLiked = likedProducts.has(product.id);
            
            if (isInCart) {
                cartBtn.classList.add('added');
                cartBtn.querySelector('span').textContent = 'Səbətdədir';
            }
            
            if (isLiked) {
                favBtn.classList.add('liked');
                favBtn.textContent = '❤️';
            }
        }

        // ============================================
        // CART SYSTEM
        // ============================================
        function toggleCart(productId) {
            const prod = products.find(p => p.id === productId);
            if (!prod) return;
            
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                cart = cart.filter(item => item.id !== productId);
                showToast('Məhsul səbətdən çıxarıldı', 'removed');
            } else {
                cart.push({ ...prod, quantity: 1 });
                showToast('Məhsul səbətə əlavə edildi ✓', 'success');
            }
            
            saveToStorage();
            updateCounts();
            updateButtonStates();
            updateCartDisplay();
        }

        // ============================================
        // FAVORITES SYSTEM
        // ============================================
        function toggleLike(productId) {
            const prod = products.find(p => p.id === productId);
            if (!prod) return;
            
            if (likedProducts.has(productId)) {
                likedProducts.delete(productId);
                favorites = favorites.filter(f => f.id !== productId);
                showToast('Sevimlilərdən çıxarıldı', 'removed');
            } else {
                likedProducts.add(productId);
                favorites.push(prod);
                showToast('Sevimlilərə əlavə edildi ❤️', 'success');
            }
            
            saveToStorage();
            updateCounts();
            updateButtonStates();
            updateFavoritesDisplay();
        }

        // ============================================
        // STORAGE
        // ============================================
        function saveToStorage() {
            localStorage.setItem('techavokado_cart', JSON.stringify(cart));
            localStorage.setItem('techavokado_favorites', JSON.stringify(favorites));
            localStorage.setItem('techavokado_liked', JSON.stringify([...likedProducts]));
        }

        // ============================================
        // TOAST NOTIFICATIONS
        // ============================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${type === 'success' ? '✓' : '✕'}</span>
                <span class="toast-message">${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================
        // UPDATE COUNTS
        // ============================================
        function updateCounts() {
            cartCount.textContent = cart.length;
            favCount.textContent = favorites.length;
            
            cartCount.style.display = cart.length > 0 ? 'inline' : 'none';
            favCount.style.display = favorites.length > 0 ? 'inline' : 'none';
        }

        // ============================================
        // UPDATE CART DISPLAY
        // ============================================
        function updateCartDisplay() {
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="empty-message">Səbətiniz boşdur!</p>';
                cartTotalPrice.textContent = '0 AZN';
                return;
            }
            
            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                total += item.priceNum;
                return `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <span class="price">${item.price} AZN</span>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                `;
            }).join('');
            
            cartTotalPrice.textContent = total + ' AZN';
        }

        // ============================================
        // UPDATE FAVORITES DISPLAY
        // ============================================
        function updateFavoritesDisplay() {
            if (favorites.length === 0) {
                favoritesItems.innerHTML = '<p class="empty-message">Hələ sevimli məhsul yoxdur!</p>';
                return;
            }
            
            favoritesItems.innerHTML = favorites.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <span class="price">${item.price} AZN</span>
                    </div>
                    <button class="cart-item-remove" onclick="toggleLike(${item.id})">Remove</button>
                </div>
            `).join('');
        }

        // ============================================
        // REMOVE FROM CART
        // ============================================
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveToStorage();
            updateCounts();
            updateCartDisplay();
            updateButtonStates();
        }

        // ============================================
        // MODAL HANDLERS
        // ============================================
        function openModal(modal) {
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modal) {
            modal.classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // ============================================
        // INITIALIZE
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            initProductDetail();
            updateCounts();
            initNavigation();
            
            // Add to cart button
            document.getElementById('btn-add-cart').addEventListener('click', () => {
                toggleCart(product.id);
            });
            
            // Favorite button
            document.getElementById('btn-favorite').addEventListener('click', () => {
                toggleLike(product.id);
            });
            
            // Checkout button
            document.getElementById('checkout-btn').addEventListener('click', () => {
                if (cart.length > 0) {
                    alert('Təşəkkür edirik! Cəmi: ' + cartTotalPrice.textContent);
                    cart = [];
                    saveToStorage();
                    updateCounts();
                    updateCartDisplay();
                    closeModal(cartModal);
                } else {
                    alert('Səbətiniz boşdur!');
                }
            });
            
            // Keyboard escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal(cartModal);
                    closeModal(favoritesModal);
                }
            });
        });

        function initNavigation() {
            // Cart modal
            document.getElementById('nav-cart').addEventListener('click', (e) => {
                e.preventDefault();
                updateCartDisplay();
                openModal(cartModal);
            });
            
            document.getElementById('close-cart').addEventListener('click', () => {
                closeModal(cartModal);
            });
            
            // Favorites modal
            document.getElementById('nav-favorites').addEventListener('click', (e) => {
                e.preventDefault();
                updateFavoritesDisplay();
                openModal(favoritesModal);
            });
            
            document.getElementById('close-favorites').addEventListener('click', () => {
                closeModal(favoritesModal);
            });
            
            // Close on outside click
            [cartModal, favoritesModal].forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        closeModal(modal);
                    }
                });
            });
            
            // Mobile menu
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const nav = document.querySelector('nav');
            
            mobileMenuBtn.addEventListener('click', () => {
                nav.classList.toggle('show');
            });
        }
    </script>

    <style>
        /* Toast Styles */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            border-color: var(--primary);
            background: rgba(34, 197, 94, 0.1);
        }

        .toast-removed {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .toast-icon {
            font-size: 20px;
        }

        .toast-success .toast-icon {
            color: var(--primary);
        }

        .toast-removed .toast-icon {
            color: #ef4444;
        }

        .toast-message {
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            #toast-container {
                left: 20px;
                right: 20px;
                bottom: 20px;
            }
        }
    </style>
</body>
</html>
